<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Đăng nhập - MetaTrader Dashboard</title>
<style>
  :root {
    --bg: #0f1420; --panel: #161d2e; --border: #2a3348; --text: #e6e9f0;
    --muted: #8a93a8; --accent: #4d8dff; --red: #d03b3b;
  }
  * { box-sizing: border-box; }
  body { margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
         font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
         background: var(--bg); color: var(--text); font-size: 14px; }
  .card { background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
          padding: 28px; width: 340px; max-width: 92vw; }
  h1 { font-size: 18px; margin: 0 0 20px; text-align: center; }
  label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; margin-top: 14px; }
  input { width: 100%; background: #0f1420; border: 1px solid var(--border); color: var(--text);
          border-radius: 6px; padding: 9px 10px; font-size: 14px; }
  button { width: 100%; margin-top: 20px; background: var(--accent); color: #fff; border: none;
           border-radius: 6px; padding: 10px; font-size: 14px; cursor: pointer; }
  button:hover { filter: brightness(1.1); }
  .error { color: var(--red); font-size: 13px; margin-top: 12px; min-height: 16px; }
  .switch { text-align: center; margin-top: 16px; font-size: 13px; color: var(--muted); }
  .switch a { color: var(--accent); text-decoration: none; }
</style>
</head>
<body>

<div class="card">
  <h1>MetaTrader Dashboard</h1>
  <form id="loginForm">
    <label>Tên đăng nhập</label>
    <input id="username" type="text" autocomplete="username" required />
    <label>Mật khẩu</label>
    <input id="password" type="password" autocomplete="current-password" required />
    <div class="error" id="error"></div>
    <button type="submit">Đăng nhập</button>
  </form>
  <div class="switch">Chưa có tài khoản? <a href="/register">Đăng ký</a></div>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const errorEl = document.getElementById('error');
  errorEl.textContent = '';
  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        username: document.getElementById('username').value,
        password: document.getElementById('password').value,
      }),
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.detail || 'Đăng nhập thất bại');
    location.href = '/';
  } catch (err) {
    errorEl.textContent = err.message;
  }
});
</script>
</body>
</html>
