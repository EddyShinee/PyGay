<!doctype html><html><head><meta charset="utf-8"><style>
:root{--panel:#12161f;--border:#232a36;--text:#e6e9ef;--muted:#8b94a7;--series-buy:#3b82f6;--series-sell:#ef4444;}
body{background:#0b0e14;color:var(--text);font-family:-apple-system,Segoe UI,Roboto,sans-serif;padding:24px;}
.panel{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:16px;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th,td{padding:10px 12px;text-align:right;border-bottom:1px solid var(--border);}
th:first-child,td:first-child{text-align:left;}
th{color:var(--muted);font-weight:500;}
.buy{color:var(--series-buy);} .sell{color:var(--series-sell);}
.profit-pos{color:#22c55e;} .profit-neg{color:#ef4444;}
.bar-cell{display:flex;flex-direction:column;align-items:flex-end;gap:5px;min-width:120px;}
.bar-cell .bar-value{font-variant-numeric:tabular-nums;font-weight:500;}
.bar-track{width:100%;height:5px;border-radius:3px;background:rgba(255,255,255,.06);overflow:hidden;display:flex;justify-content:flex-end;}
.bar-fill{height:100%;border-radius:3px;opacity:.85;}
td.bar-td{vertical-align:middle;}
</style></head><body>
<div class="panel">
<table><thead><tr>
<th>Thời gian</th><th class="buy">BUY (lệnh)</th><th>BUY lãi/lỗ</th>
<th class="sell">SELL (lệnh)</th><th>SELL lãi/lỗ</th><th>Tổng</th>
</tr></thead><tbody id="b"></tbody></table>
</div>
<script>
function fmt(v){return (v>=0?'':'')+v.toFixed(2);}
function profitBar(value,maxAbs,side){
 const pct=maxAbs>0?Math.min(100,Math.abs(value)/maxAbs*100):0;
 const color=side==='BUY'?'var(--series-buy)':'var(--series-sell)';
 const tc=value>=0?'profit-pos':'profit-neg';
 return `<div class="bar-cell"><span class="bar-value ${tc}">${fmt(value)}</span><div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${color}"></div></div></div>`;
}
const rows=[
 {p:'2026-07',bt:512,bp:6771.36,st:664,sp:-5870.37},
 {p:'2026-06',bt:50,bp:480.87,st:77,sp:-396.48},
];
let maxAbs=0; rows.forEach(r=>{maxAbs=Math.max(maxAbs,Math.abs(r.bp),Math.abs(r.sp));});
document.getElementById('b').innerHTML=rows.map(r=>{
 const total=r.bp+r.sp;
 return `<tr><td>${r.p}</td><td class="buy">${r.bt}</td><td class="bar-td">${profitBar(r.bp,maxAbs,'BUY')}</td>`+
 `<td class="sell">${r.st}</td><td class="bar-td">${profitBar(r.sp,maxAbs,'SELL')}</td>`+
 `<td class="${total>=0?'profit-pos':'profit-neg'}">${fmt(total)}</td></tr>`;
}).join('');
</script></body></html>
